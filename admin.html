<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片管理 — 万晨图影设计</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f4f0;--text:#1a1a1a;--text-muted:#6b6b6b;
  --accent:#1a1a1a;--glass-bg:rgba(255,255,255,0.65);
  --glass-border:rgba(0,0,0,0.06);--radius:16px;--radius-sm:10px;
  --font-sans:'Noto Sans SC','PingFang SC','Hiragino Sans GB',sans-serif;
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);padding:40px 20px;max-width:1100px;margin:0 auto}
h1{font-size:28px;font-weight:900;margin-bottom:8px;letter-spacing:-0.02em}
.sub{font-size:14px;color:var(--text-muted);margin-bottom:32px}
.glass-card{
  background:var(--glass-bg);backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:var(--radius);
  padding:24px;margin-bottom:20px;transition:all .25s ease
}
.glass-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.04)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:900px){.grid4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.grid3{grid-template-columns:repeat(2,1fr)}body{padding:24px 12px}}
@media(max-width:480px){.grid3,.grid4{grid-template-columns:1fr}}

.section-title{font-size:18px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--glass-border)}
.card-img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:var(--radius-sm);background:#eae8e3;margin-bottom:10px}
.card-name{font-size:13px;font-weight:600;margin-bottom:4px}
.card-id{font-size:11px;color:var(--text-muted);word-break:break-all;margin-bottom:12px}
.card-desc{font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.4}

.upload-area{
  border:2px dashed var(--glass-border);border-radius:var(--radius);
  padding:36px 24px;text-align:center;cursor:pointer;transition:all .25s;
  background:var(--glass-bg);margin-bottom:12px
}
.upload-area:hover{border-color:var(--accent);background:rgba(0,0,0,0.02)}
.upload-area.drag{border-color:var(--accent);background:rgba(0,0,0,0.04)}
.upload-area p{font-size:14px;color:var(--text-muted)}
.status{font-size:12px;color:var(--text-muted);text-align:center;margin-top:4px;margin-bottom:12px;min-height:18px}
.status.ok{color:#2d8a4e}
.status.err{color:#c0392b}

.nav{display:flex;gap:16px;margin-bottom:32px}
.nav a{font-size:13px;color:var(--text-muted);text-decoration:none;padding:6px 14px;border:1px solid var(--glass-border);border-radius:20px;transition:all .2s}
.nav a:hover,.nav a.active{color:var(--accent);border-color:var(--accent)}

.btn{display:inline-block;padding:6px 14px;font-size:12px;border:1px solid var(--glass-border);border-radius:20px;cursor:pointer;background:none;color:var(--text-muted);transition:all .2s}
.btn:hover{color:var(--accent);border-color:var(--accent)}
.btn.upload-trigger{margin-top:8px}
.btn.enter-style{display:block;width:100%;margin-top:12px;text-align:center;font-size:11px;padding:8px}

/* 登录覆盖层 */
.login-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);display:flex;align-items:center;
  justify-content:center;z-index:1000;padding:20px;
}
.login-card{
  background:white;border-radius:var(--radius);padding:32px;
  width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.login-title{font-size:24px;font-weight:900;margin-bottom:24px;text-align:center}
.login-input{
  width:100%;padding:14px 16px;font-size:16px;border:1px solid #ddd;
  border-radius:10px;margin-bottom:16px;font-family:var(--font-sans);
}
.login-input:focus{outline:none;border-color:var(--accent)}
.login-btn{
  width:100%;padding:14px;font-size:16px;font-weight:600;
  background:var(--accent);color:white;border:none;border-radius:10px;
  cursor:pointer;transition:background .2s;font-family:var(--font-sans);
}
.login-btn:hover{background:#333}
.login-error{color:#c0392b;font-size:14px;text-align:center;margin-top:12px;min-height:20px}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- 登录覆盖层 -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <h2 class="login-title">管理后台登录</h2>
    <input type="text" id="username" class="login-input" placeholder="账号" autocomplete="off">
    <input type="password" id="password" class="login-input" placeholder="密码" autocomplete="off">
    <button id="loginBtn" class="login-btn">登录</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- 管理内容 -->
<div id="adminContent" class="hidden">
  <div class="nav">
    <a href="index.html">← 返回网站首页</a>
    <a href="styles.html">风格预览</a>
    <a href="cases.html">案例参考</a>
  </div>
  <h1>图片管理后台</h1>
  <p class="sub">点击风格卡片进入二级管理页，上传替换该风格下的所有图片。</p>

  <div class="section-title">选择风格</div>
  <div class="grid4" id="styleList"></div>
</div>

<script>
const STYLES = [
  {id:"minimal", name:"高级极简风", page:"style-minimal.html", desc:"咖啡、甜品、品牌菜单、包装", count:7, color:"#e8e6e1"},
  {id:"dark-food", name:"深色质感餐饮风", page:"style-dark-food.html", desc:"牛肉面、烧肉、火锅、酒馆", count:0, color:"#1a1a1a"},
  {id:"chinese", name:"国潮中式风", page:"style-chinese.html", desc:"中餐、茶饮、中式点心、老字号", count:0, color:"#c41e3a"},
  {id:"japanese", name:"日系清新风", page:"style-japanese.html", desc:"日料、烘焙、甜品、生活美学", count:0, color:"#c8d6c5"},
  {id:"ecommerce", name:"电商促销风", page:"style-ecommerce.html", desc:"淘宝、拼多多、直播带货、限时活动", count:0, color:"#ff6b35"},
  {id:"retro", name:"复古手绘风", page:"style-retro.html", desc:"精酿啤酒、独立咖啡、手作工坊", count:0, color:"#d4c5a9"},
  {id:"tech", name:"科技未来风", page:"style-tech.html", desc:"科技产品、电竞、数码硬件、AI应用", count:0, color:"#0a0e27"},
  {id:"cartoon", name:"卡通插画风", page:"style-cartoon.html", desc:"亲子餐厅、零食品牌、教育产品", count:0, color:"#f7e8a0"},
];

// 检查登录状态
function checkAuth(){
  var isLoggedIn = sessionStorage.getItem("admin_auth") === "true";
  var overlay = document.getElementById("loginOverlay");
  var content = document.getElementById("adminContent");
  if(isLoggedIn){
    overlay.classList.add("hidden");
    content.classList.remove("hidden");
    renderStyleList();
  } else {
    overlay.classList.remove("hidden");
    content.classList.add("hidden");
  }
}

// 登录功能
function setupLogin(){
  var u = document.getElementById("username");
  var p = document.getElementById("password");
  var btn = document.getElementById("loginBtn");
  var err = document.getElementById("loginError");

  function doLogin(){
    var pHash = CryptoJS.SHA256(p.value.trim()).toString();
        if(u.value.trim() === "332211" && pHash === "e0bc60c82713f64ef8a57c0c40d02ce24fd0141d5cc3086259c19b1e62a62bea"){
      sessionStorage.setItem("admin_auth", "true");
      err.textContent = "";
      checkAuth();
    } else {
      err.textContent = "账号或密码错误";
      p.value = "";
      p.focus();
    }
  }

  btn.addEventListener("click", doLogin);
  u.addEventListener("keypress", function(e){ if(e.key==="Enter") p.focus(); });
  p.addEventListener("keypress", function(e){ if(e.key==="Enter") doLogin(); });
  u.focus();
}

function renderStyleList(){
  var el = document.getElementById("styleList");
  el.innerHTML = STYLES.map(function(s){
    var fallback = 'background:'+s.color+';display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-muted)';
    return '<div class="glass-card">'
      + '<img class="card-img" src="https://res.cloudinary.com/dzcob4flc/image/upload/f_auto,q_auto/wanchen_assets/'+s.id+'-hero.png?v=1" loading="lazy" onerror="var d=document.createElement(\'div\');d.className=\'card-img\';d.style=\''+fallback+'\';d.textContent=\''+s.name+'\';this.replaceWith(d)">'
      + '<div class="card-name">'+s.name+'</div>'
      + '<div class="card-desc">'+s.desc+'</div>'
      + '<div class="card-id">'+s.count+' 张图片</div>'
      + '<a href="admin-'+s.id+'.html" class="btn enter-style">进入管理</a>'
      + '</div>';
  }).join("");
}

document.addEventListener("DOMContentLoaded", function(){
  checkAuth();
  setupLogin();
});
</script>
</body>
</html>
