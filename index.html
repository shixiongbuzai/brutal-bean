<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万晨图影设计 — 视觉参考库</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#f5f4f0;--bg-alt:#eae8e3;--text:#1a1a1a;--text-muted:#6b6b6b;
    --accent:#1a1a1a;--accent-hover:#444;--border:rgba(0,0,0,0.08);
    --glass-bg:rgba(255,255,255,0.65);--glass-border:rgba(0,0,0,0.06);
    --glass-shadow:0 2px 20px rgba(0,0,0,0.04);--radius:20px;
    --radius-sm:12px;--font-sans:'Noto Sans SC','PingFang SC','Hiragino Sans GB',sans-serif;
    --font-mono:'SF Mono','Cascadia Code','Consolas',monospace;
  }
  html{scroll-behavior:smooth;font-size:16px}
  body{
    font-family:var(--font-sans);background:var(--bg);color:var(--text);
    line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden
  }
  body::before{
    content:'';position:fixed;top:-30%;left:-20%;width:60%;height:100%;
    background:radial-gradient(ellipse,rgba(0,0,0,0.015) 0%,transparent 70%);
    pointer-events:none;z-index:0
  }
  body::after{
    content:'';position:fixed;bottom:-20%;right:-15%;width:50%;height:80%;
    background:radial-gradient(ellipse,rgba(0,0,0,0.01) 0%,transparent 70%);
    pointer-events:none;z-index:0
  }

  /* Nav */
  .nav{
    position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;
    width:calc(100% - 32px);max-width:720px;
    background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);border-radius:var(--radius-sm);
    box-shadow:var(--glass-shadow);padding:12px 24px;
    display:flex;justify-content:space-between;align-items:center
  }
  .nav-brand{font-weight:700;font-size:15px;letter-spacing:-0.01em;color:var(--accent);text-decoration:none}
  .nav-links{display:flex;gap:24px;list-style:none}
  .nav-links a{color:var(--text-muted);text-decoration:none;font-size:13px;transition:color .2s;letter-spacing:0.02em}
  .nav-links a:hover{color:var(--accent)}
  @media(max-width:640px){
    .nav{padding:10px 16px;top:8px;width:calc(100% - 16px)}
    .nav-brand{font-size:13px}
    .nav-links{gap:12px}
    .nav-links a{font-size:11px}
  }

  /* Footer */
  .footer-cta{
    max-width:480px;margin:80px auto 40px;padding:28px 32px;
    background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--glass-border);border-radius:var(--radius);
    box-shadow:var(--glass-shadow);text-align:center
  }
  .footer-cta .fc-text{font-size:14px;color:var(--text-muted);margin-bottom:12px;line-height:1.7}
  .footer-cta .fc-contact{font-size:15px;font-weight:600;color:var(--accent);letter-spacing:0.03em}
  .site-footer{padding:32px;text-align:center;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border)}
  @media(max-width:640px){.footer-cta{margin:48px 16px 32px;padding:24px 20px}}

  /* Buttons */
  .btn-primary{
    display:inline-block;padding:12px 28px;background:var(--accent);color:#fff;
    border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;
    letter-spacing:0.02em;transition:all .25s;border:none;cursor:pointer
  }
  .btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
  .btn-outline{
    display:inline-block;padding:10px 24px;background:transparent;color:var(--accent);
    border:1.5px solid var(--accent);border-radius:10px;font-size:13px;
    font-weight:500;text-decoration:none;letter-spacing:0.02em;transition:all .25s
  }
  .btn-outline:hover{background:var(--accent);color:#fff}

  /* Glass card base */
  .glass-card{
    background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--glass-border);border-radius:var(--radius);
    box-shadow:var(--glass-shadow);transition:all .3s ease
  }
  .glass-card:hover{
    transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,0.08);
    border-color:rgba(0,0,0,0.14)
  }
</style>
</head>
<body>
<div class="nav">
  <a href="index.html" class="nav-brand">万晨图影设计</a>
  <ul class="nav-links">
    <li><a href="styles.html">设计风格预览</a></li>
    <li><a href="cases.html">案例参考</a></li>
    <li><a href="#contact">联系</a></li>
  </ul>
</div>

<section style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:120px 24px 60px;position:relative">
  <h1 style="font-size:clamp(40px,8vw,80px);font-weight:900;letter-spacing:-0.03em;line-height:1.05;margin-bottom:16px">万晨图影设计</h1>
  <p style="font-size:clamp(18px,3vw,26px);color:var(--text-muted);margin-bottom:8px;font-weight:400">先选风格，再做设计</p>
  <p style="font-size:clamp(13px,1.5vw,16px);color:var(--text-muted);max-width:520px;line-height:1.8;margin-bottom:56px">
    这里是一份给客户看的视觉参考库，你可以先选择喜欢的设计风格，再根据案例确认具体物料的呈现方式。
  </p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:800px;width:100%">
    <a href="styles.html" class="glass-card" style="text-decoration:none;padding:40px 28px;display:block;text-align:left">
      <p style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">STEP 01</p>
      <h2 style="font-size:clamp(20px,3vw,28px);font-weight:800;color:var(--accent);margin-bottom:12px">设计风格预览</h2>
      <p style="font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:20px">还没确定想要什么感觉？先从这里选择整体视觉方向。</p>
      <span class="btn-primary" style="font-size:13px">进入风格库</span>
    </a>
    <a href="cases.html" class="glass-card" style="text-decoration:none;padding:40px 28px;display:block;text-align:left">
      <p style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">STEP 02</p>
      <h2 style="font-size:clamp(20px,3vw,28px);font-weight:800;color:var(--accent);margin-bottom:12px">案例参考</h2>
      <p style="font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:20px">已经知道要做菜单、海报、电商图或包装？从这里查看具体落地案例。</p>
      <span class="btn-primary" style="font-size:13px">查看案例</span>
    </a>
  </div>
</section>

<div class="footer-cta" id="contact">
  <p class="fc-text">确定风格后，把风格名称或案例截图发给我们即可开始沟通</p>
  <p class="fc-contact">微信：wctysj</p>
  <p style="font-size:12px;color:var(--text-muted);margin-top:6px">备注：设计咨询 + 项目类型</p>
</div>
<div class="site-footer">© 2024 万晨图影设计</div>
</body></html>
