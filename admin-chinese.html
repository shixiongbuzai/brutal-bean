<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国潮中式风管理 — 万晨图影设计</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','PingFang SC','Hiragino Sans GB',sans-serif;background:#f5f4f0;color:#1a1a1a;padding:30px 16px;max-width:800px;margin:0 auto}
.nav{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.nav a{font-size:13px;color:#6b6b6b;text-decoration:none;padding:6px 14px;border:1px solid #e0ddd8;border-radius:20px}
h1{font-size:24px;font-weight:900;margin-bottom:4px}
.sub{font-size:14px;color:#6b6b6b;margin-bottom:20px}

.upload-box{
  border:2px dashed #bbb;border-radius:16px;padding:28px 16px;text-align:center;
  cursor:pointer;background:#f9f8f5;margin-bottom:20px;
}
.upload-box:hover, .upload-box.active{border-color:#333;background:#f0efeb}
.upload-box p{font-size:14px;color:#6b6b6b;margin-bottom:6px}
.upload-box .btn{margin-top:6px}
.status{font-size:13px;color:#6b6b6b;text-align:center;margin-bottom:16px;min-height:20px}
.status.ok{color:#2d8a4e}
.status.err{color:#c0392b}

.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(min-width:640px){.img-grid{grid-template-columns:repeat(3,1fr)}}

.img-card{
  background:#fff;border:1px solid #e8e5e0;border-radius:14px;
  padding:10px;text-align:center;
}
.img-card .preview{
  width:100%;aspect-ratio:4/3;border-radius:10px;background:#eae8e3;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#aaa;margin-bottom:8px;overflow:hidden;
}
.img-card .preview img{width:100%;height:100%;object-fit:cover;display:block}
.img-card .title{font-size:12px;font-weight:600;margin-bottom:2px}
.img-card .fid{font-size:10px;color:#aaa;margin-bottom:6px}
.btn{
  display:inline-block;padding:5px 12px;font-size:11px;border:1px solid #ccc;
  border-radius:16px;cursor:pointer;background:#fff;color:#555;
}
.btn:hover{color:#111;border-color:#888}
.btn.block{display:block;width:100%;text-align:center}
</style>
</head>
<body>
<div class="nav">
  <a href="admin.html">← 管理首页</a>
  <a href="index.html">网站首页</a>
  <a href="styles.html">风格预览</a>
</div>
<h1>国潮中式风 · 图片管理</h1>
<p class="sub">点击图片下方「替换」按钮选择新图片上传，覆盖后刷新网站即生效。</p>

<div class="upload-box" id="dropZone">
  <p>拖拽图片到此处上传 <br><small>（文件名需与目标ID一致）</small></p>
  <input type="file" id="fileInput" hidden accept="image/png,image/jpeg,image/webp">
  <button class="btn" onclick="document.getElementById('fileInput').click()">点击选择文件</button>
</div>
<div class="status" id="status"></div>

<div class="img-grid" id="gallery"></div>

<script>
var CLOUD_NAME = "dzcob4flc";
var UPLOAD_PRESET = "wanchen_upload";
var API_URL = "https://api.cloudinary.com/v1_1/" + CLOUD_NAME + "/image/upload";
var IMGS = ["chinese-hero", "chinese-menu", "chinese-spring", "chinese-pack", "chinese-material", "chinese-midautumn", "chinese-classic"];
var NAMES = ["主视觉（首屏）", "中餐折页菜单", "春节活动海报", "茶饮杯/礼盒包装", "名片/手提袋", "中秋节海报", "老字号菜单"];
var targetId = null;

function imgUrl(id) {
  return "https://res.cloudinary.com/" + CLOUD_NAME + "/image/upload/f_auto,q_auto/wanchen_assets/" + id + ".png";
}

function build() {
  var g = document.getElementById("gallery");
  var h = "";
  for (var i = 0; i < IMGS.length; i++) {
    var id = IMGS[i];
    var nm = NAMES[i];
    h += '<div class="img-card">';
    h += '<div class="preview" id="pv_' + i + '">';
    h += '<img src="' + imgUrl(id) + '" alt="' + nm + '" onerror="fallback(' + i + ')" onload="loaded(' + i + ')">';
    h += '<span id="fb_' + i + '" style="display:none">' + nm + '</span>';
    h += '</div>';
    h += '<div class="title">' + nm + '</div>';
    h += '<div class="fid">' + id + '.png</div>';
    h += '<button class="btn block" data-img="' + id + '">替换此图</button>';
    h += '</div>';
  }
  g.innerHTML = h;
  // bind click events
  var btns = g.querySelectorAll("button[data-img]");
  for (var j = 0; j < btns.length; j++) {
    btns[j].onclick = (function(imgId) {
      return function() { pick(imgId); };
    })(btns[j].getAttribute("data-img"));
  }
}

function fallback(i) {
  var fb = document.getElementById("fb_" + i);
  if (fb) fb.style.display = "block";
}
function loaded(i) {
  var fb = document.getElementById("fb_" + i);
  if (fb) fb.style.display = "none";
}

function pick(id) {
  targetId = id;
  document.getElementById("fileInput").click();
}

function upload(file) {
  if (!targetId) return;
  var st = document.getElementById("status");
  st.textContent = "上传中...";
  st.className = "status";
  var fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", UPLOAD_PRESET);
  fd.append("public_id", "wanchen_assets/" + targetId);
  fd.append("overwrite", "true");
  fd.append("invalidate", "true");
  fetch(API_URL, {method:"POST", body:fd})
    .then(function(r){return r.json()})
    .then(function(d){
      if (d.secure_url) {
        st.textContent = targetId + ".png 替换成功，刷新网站即生效";
        st.className = "status ok";
        var t = targetId;
        targetId = null;
        setTimeout(function(){ for(var i=0;i<IMGS.length;i++){ if(IMGS[i]===t){ var img=document.querySelector("#pv_"+i+" img"); if(img)img.src=imgUrl(t)+"?t="+Date.now(); } } }, 500);
      } else {
        st.textContent = "上传失败: " + (d.error ? d.error.message : "未知错误");
        st.className = "status err";
        targetId = null;
      }
    })
    .catch(function(e){
      st.textContent = "上传失败: " + e.message;
      st.className = "status err";
      targetId = null;
    });
}

document.getElementById("fileInput").onchange = function(e) {
  if (e.target.files[0]) upload(e.target.files[0]);
  this.value = "";
};

var dz = document.getElementById("dropZone");
dz.ondragover = function(e) { e.preventDefault(); dz.className = "upload-box active"; };
dz.ondragleave = function() { dz.className = "upload-box"; };
dz.ondrop = function(e) {
  e.preventDefault();
  dz.className = "upload-box";
  if (e.dataTransfer.files[0]) {
    var fn = e.dataTransfer.files[0].name.replace(/\.[^.]+$/,"");
    var m = IMGS.indexOf(fn);
    if (m >= 0) { targetId = IMGS[m]; upload(e.dataTransfer.files[0]); }
    else { document.getElementById("status").textContent = '"' + fn + '" 未匹配，请点卡片「替换」按钮'; document.getElementById("status").className = "status err"; }
  }
};

build();
</script>
</body>
</html>
